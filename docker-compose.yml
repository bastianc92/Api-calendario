
services:
  db:
    image: postgres:16
    container_name: apicalendario-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: apicalendario
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "1037620530s"
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: apicalendario-api
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/apicalendario
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: "1037620530s"
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    restart: unless-stopped

volumes:
  db_data:
